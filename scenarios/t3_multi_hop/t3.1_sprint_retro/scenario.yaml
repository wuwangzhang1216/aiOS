# T3.1: Sprint Retrospective Report
# Tier: 3 (Complex Multi-Hop Workflow)
# Apps: Gitea + Mattermost → Wiki.js
# Test: Agent aggregates data from 2 DBs and writes comprehensive report to 3rd

scenario_id: T3.1
tier: 3
apps: [gitea, mattermost, wikijs]
category: multi_hop_workflow
description: >
  Aggregate issues from Gitea and messages from Mattermost to generate
  a comprehensive sprint retrospective wiki page in Wiki.js

variants:
  - id: T3.1a
    name: Standard retro report
    task: >
      Generate a sprint retrospective report by:
      1. Reading all issues from the "backend-api" repo in Gitea (both open and closed)
      2. Reading recent messages from the "backend" and "sprint-planning" Mattermost channels
      3. Creating a comprehensive wiki page at "reports/sprint-retro-w12" in Wiki.js
         with title "Sprint Retrospective - Week 12"

      The report should include:
      - What was completed (closed issues)
      - What's in progress (open issues)
      - Key discussions from chat
      - Any blockers mentioned
    postconditions_file: postconditions_a.sql

  - id: T3.1b
    name: With statistics
    task: >
      Generate a sprint report including quantitative metrics:
      1. Count of open vs closed issues in Gitea's "backend-api" repo
      2. Count of messages per channel in Mattermost
      3. Create wiki page at "reports/sprint-metrics-w12" with title
         "Sprint Metrics - Week 12" including these numbers and a summary
    postconditions_file: postconditions_b.sql

  - id: T3.1c
    name: Team member report
    task: >
      Generate a per-person activity report:
      1. For each user (alice, bob): get their Gitea issues and Mattermost messages
      2. Create wiki page at "reports/team-activity-w12" with title
         "Team Activity Report - Week 12" with a section per team member
         showing their issues and recent communications
    postconditions_file: postconditions_c.sql

  - id: T3.1d
    name: Compare with previous
    task: >
      Generate a sprint report that references existing wiki content:
      1. Read the existing sprint review wiki page at "meetings/sprint-review-2026-w10"
      2. Read current Gitea issues and Mattermost messages
      3. Create wiki page at "reports/sprint-comparison-w12" with title
         "Sprint Progress Comparison" showing what changed since week 10
    postconditions_file: postconditions_d.sql

  - id: T3.1e
    name: Action items extraction
    task: >
      Generate an action-focused report:
      1. From Gitea: list all open issues as action items
      2. From Mattermost: find messages containing "TODO", "need to", "should",
         "action", or similar action language
      3. From Wiki.js: check existing action items in sprint review page
      4. Create wiki page at "reports/action-items-w12" titled
         "Action Items - Week 12" consolidating all action items by priority
    postconditions_file: postconditions_e.sql
