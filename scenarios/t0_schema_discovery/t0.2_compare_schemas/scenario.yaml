# T0.2: Cross-App Schema Comparison
# The agent must explore two databases and compare their structure.
scenario_id: T0.2
tier: 0
apps: [gitea, vikunja, mattermost]
category: schema_discovery

variants:
  - id: T0.2a
    task: >
      Compare how Gitea and Vikunja store their data. Explore both databases
      without prior knowledge of their schemas. Find out what column stores the
      username in each app's user table. Then post your findings to Mattermost's
      "general" channel with the column names you discovered.
    postcondition: "SELECT 1 FROM posts p JOIN channels c ON p.channelid = c.id WHERE c.name = 'general' AND (p.message LIKE '%user%' OR p.message LIKE '%name%')"
    target_db: mattermost

  - id: T0.2b
    task: >
      Explore the Gitea and Mattermost databases. Compare how each app
      models its core content (issues vs messages). Post a brief comparison
      to the Mattermost "backend" channel describing the key tables and
      columns used in each app.
    postcondition: "SELECT 1 FROM posts p JOIN channels c ON p.channelid = c.id WHERE c.name = 'backend' AND (p.message LIKE '%table%' OR p.message LIKE '%schema%' OR p.message LIKE '%column%')"
    target_db: mattermost
