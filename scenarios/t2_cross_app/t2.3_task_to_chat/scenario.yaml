# T2.3: Vikunja Completed Task → Mattermost Notification
scenario_id: T2.3
tier: 2
apps: [vikunja, mattermost]
category: cross_app_workflow

variants:
  - id: T2.3a
    task: >
      Find all completed tasks in Vikunja's "Infrastructure" project.
      Post a summary message to the Mattermost "devops" channel listing what was completed.
    postcondition: "SELECT 1 FROM posts p JOIN channels c ON p.channelid = c.id WHERE c.name = 'devops' AND p.message LIKE '%completed%'"

  - id: T2.3b
    task: >
      Find all high-priority open tasks in Vikunja (priority 3 or above).
      Post an alert to the Mattermost "general" channel listing these urgent items.
    postcondition: "SELECT 1 FROM posts p JOIN channels c ON p.channelid = c.id WHERE c.name = 'general' AND (p.message ILIKE '%urgent%' OR p.message ILIKE '%priority%')"
