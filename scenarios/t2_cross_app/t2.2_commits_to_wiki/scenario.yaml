# T2.2: Write Git Commit Summary to Wiki
# Tier: 2 (Cross-App Workflow)
# Apps: Gitea → Wiki.js
# Test: Agent reads from Gitea DB and writes summary to Wiki.js DB

scenario_id: T2.2
tier: 2
apps: [gitea, wikijs]
category: cross_app_workflow
description: Read commit/issue data from Gitea and create a summary wiki page

variants:
  - id: T2.2a
    name: Single repo issues to wiki
    task: >
      Read all open issues from the "backend-api" repository in Gitea.
      Create a wiki page in Wiki.js at path "reports/backend-api-issues"
      with title "Backend API - Open Issues" listing each issue with its
      title and a brief description.
    postconditions_file: postconditions_a.sql

  - id: T2.2b
    name: All repos summary
    task: >
      Read all repositories from Gitea. Create a wiki page in Wiki.js at
      path "reports/all-repositories" with title "Repository Catalog" listing
      each repository with its name, owner, description, and star count.
    postconditions_file: postconditions_b.sql

  - id: T2.2c
    name: Closed issues report
    task: >
      Read all closed issues from Gitea's "backend-api" repository.
      Create a wiki page at "reports/resolved-issues" in Wiki.js with
      title "Resolved Issues Report" documenting what was fixed.
    postconditions_file: postconditions_c.sql

  - id: T2.2d
    name: Repo with stats
    task: >
      Read the "backend-api" repo from Gitea, including counts of open issues,
      closed issues, stars, and forks. Create a wiki page at
      "reports/backend-api-stats" with title "Backend API Statistics"
      including these metrics.
    postconditions_file: postconditions_d.sql

  - id: T2.2e
    name: Issues grouped by label
    task: >
      Read issues from the "backend-api" repo in Gitea and group them by
      label. Create a wiki page at "reports/issues-by-label" with title
      "Issues by Label" showing issues organized under their label headings.
    postconditions_file: postconditions_e.sql
