# T2.3: Sync Wiki Notes to Mattermost Channel
# Tier: 2 (Cross-App Workflow)
# Apps: Wiki.js → Mattermost
# Test: Agent reads from Wiki.js DB and posts to Mattermost DB

scenario_id: T2.3
tier: 2
apps: [wikijs, mattermost]
category: cross_app_workflow
description: Read wiki page content and post a summary to a Mattermost channel

variants:
  - id: T2.3a
    name: Simple sync
    task: >
      Read the wiki page at path "meetings/sprint-review-2026-w10" from Wiki.js.
      Post a message to Mattermost's "sprint-planning" channel (as user "alice")
      with a brief summary of the sprint review content.
    postconditions_file: postconditions_a.sql

  - id: T2.3b
    name: Summary version
    task: >
      Read the wiki page at path "meetings/standup-2026-03-18" from Wiki.js.
      Post a condensed 2-3 line summary to Mattermost's "general" channel
      (as user "alice") highlighting key points and blockers.
    postconditions_file: postconditions_b.sql

  - id: T2.3c
    name: Action items extraction
    task: >
      Read the sprint review wiki page ("meetings/sprint-review-2026-w10").
      Extract only the action items and post them to Mattermost's "backend"
      channel (as user "alice") formatted as a checklist.
    postconditions_file: postconditions_c.sql

  - id: T2.3d
    name: Post to specific channel
    task: >
      Read the "architecture/backend" wiki page from Wiki.js.
      Post its key points (stack info and services list) to the "backend"
      Mattermost channel as user "bob".
    postconditions_file: postconditions_d.sql

  - id: T2.3e
    name: Notify with mention
    task: >
      Read the onboarding wiki page ("onboarding/new-developer") from Wiki.js.
      Post a welcome message to the "general" Mattermost channel as user "alice"
      that mentions @bob and references the onboarding page content.
    postconditions_file: postconditions_e.sql
